[Broker]
UsbipPath=C:\Program Files\Usbip\usbip.exe
ThinClients=
AttachPolicy=allowlist
AllowedDevices=303a:1001,303a:*,10c4:ea60,1a86:7523,0403:6010,0403:6001
BlockedDevices=1d6b:*,2a7a:9a18,10c4:8105
PollIntervalSeconds=5
CommandTimeoutSeconds=25
AttachRetryCount=3
AttachRetryDelaySeconds=2
LogPath=C:\ProgramData\UsbipBrokerCpp\logs\broker.log
StatePath=C:\ProgramData\UsbipBrokerCpp\state.txt
AuditLogPath=C:\ProgramData\UsbipBrokerCpp\logs\audit.csv

[Events]
Enabled=1
Port=12000

[WinUSB]
; Quando Enabled=1, o servico procura dispositivos presentes no Windows por
; Get-PnpDevice e aplica pnputil /add-driver <INF> /install quando o InstanceId
; casar com uma das regras abaixo.
Enabled=1
DefaultDriverInf=C:\Program Files\UsbipSuite\drivers\usbip-winusb.inf
SettleSeconds=3
RetryCount=2
Rules=ESP32S3_NATIVE_JTAG,ESP_PROG_FT2232_JTAG

[WinUSB.ESP32S3_NATIVE_JTAG]
Description=ESP32-S3 native USB Serial/JTAG - somente interface JTAG
Pattern=USB\VID_303A&PID_1001&MI_02*
; DriverInf vazio usa DefaultDriverInf.
DriverInf=

[WinUSB.ESP_PROG_FT2232_JTAG]
Description=ESP-PROG FT2232H channel A - JTAG/OpenOCD
Pattern=USB\VID_0403&PID_6010&MI_00*
; Nao use MI_01 aqui: normalmente e a UART/COM do ESP-PROG.
DriverInf=

; Mapeamento de IP do thin client para nome da estacao.
; Cada linha: <IP>=<nome>
; Exemplo:
;   192.168.100.31=Estacao-01
;   192.168.100.32=Estacao-02
[Stations]
